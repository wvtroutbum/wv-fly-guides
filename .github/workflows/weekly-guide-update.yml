name: Weekly Fly Guide Update
on:
  schedule:
    - cron: '0 12 * * 5'  # Every Friday 7am ET
  workflow_dispatch:        # Manual trigger anytime

jobs:
  update-guides:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Notify start
        run: |
          curl -s \
            -H "Title: WV Fly Guides update started" \
            -H "Tags: fishing,arrows_counterclockwise" \
            -H "Click: https://wv-fly-guides.vercel.app" \
            -d "Friday conditions refresh kicked off $(date -u +'%Y-%m-%d %H:%M UTC'). Tap to open the app." \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run guide updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_guides.py

      - name: Commit and push updates
        run: |
          git config user.name "wv-fly-guides-bot"
          git config user.email "bot@wv-fly-guides"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d') Friday conditions refresh"
          git push

      - name: Notify complete
        if: always()
        run: |
          APP_URL="https://wv-fly-guides.vercel.app"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="WV Fly Guides updated"
            TAGS="white_check_mark,fishing"
            PRIORITY="default"
            CLICK="$APP_URL"
            BODY="Guides refreshed and deploying. Tap to open the app: $APP_URL"
          else
            TITLE="WV Fly Guides update FAILED"
            TAGS="x,rotating_light"
            PRIORITY="high"
            CLICK="$RUN_URL"
            BODY="Status: ${{ job.status }}. Tap for the run log: $RUN_URL"
          fi
          curl -s \
            -H "Title: $TITLE" \
            -H "Tags: $TAGS" \
            -H "Priority: $PRIORITY" \
            -H "Click: $CLICK" \
            -d "$BODY" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true
