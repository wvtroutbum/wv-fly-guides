name: Weekly Fly Guide Update
on:
  schedule:
    - cron: '0 12 * * 5'  # Every Friday 7am ET
  workflow_dispatch:        # Manual trigger anytime

jobs:
  update-guides:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run guide updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_guides.py

      - name: Commit and push updates
        run: |
          git config user.name "wv-fly-guides-bot"
          git config user.email "bot@wv-fly-guides"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d') Friday conditions refresh"
          git push
